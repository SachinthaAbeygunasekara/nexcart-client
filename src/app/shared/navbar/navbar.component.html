<!-- Navbar -->
<nav class="bg-gradient-to-r from-blue-500 to-blue-600 sticky top-0 z-40 shadow-lg">
  <div class="max-w-7xl mx-auto px-4 py-3">
    <div class="flex items-center justify-between">
      <!-- Logo -->
      <div class="flex items-center">
        <h1 class="text-white text-2xl font-bold">NexCart</h1>
      </div>

      <!-- Search Bar -->
      <div class="flex-1 mx-8">
        <div class="flex gap-2">
          <input
            type="text"
            [(ngModel)]="searchQuery"
            (keyup.enter)="search()"
            placeholder="Search products..."
            class="flex-1 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300 bg-white text-gray-800">
          <button (click)="search()"
                  class="bg-white text-blue-500 px-4 py-2 rounded-lg font-semibold hover:bg-gray-100">
            🔍
          </button>
        </div>
      </div>

      <!-- Right Actions -->
      <div class="flex items-center gap-4">
        <!-- Admin Dashboard Button -->
        @if (isAdmin) {
          <a routerLink="/admin"
             class="flex items-center gap-2 px-4 py-2 text-white bg-orange-500 hover:bg-orange-600 rounded-lg font-semibold transition shadow-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            Dashboard
          </a>
        }

        <!-- Cart Icon (disabled for admin) -->
        <button (click)="openCart()" [disabled]="isAdmin" [attr.aria-disabled]="isAdmin" class="relative transition" [ngClass]="{ 'opacity-50 cursor-not-allowed': isAdmin, 'hover:opacity-80': !isAdmin }">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" />
          </svg>

          @if (cartCount > 0 && !isAdmin) {
            <span
              class="absolute top-0 right-0 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">{{ cartCount }}</span>
          }
        </button>

        <!-- Auth Buttons -->
        <div class="flex gap-2">
          @if (!isLoggedIn) {
            <button
              (click)="openLogin()"
              class="px-4 py-2 text-blue-500 bg-white rounded-lg font-semibold hover:bg-gray-100 transition">
              Login
            </button>
          }
          @if (!isLoggedIn) {
            <button
              (click)="openRegister()"
              class="px-4 py-2 text-white border-2 border-white rounded-lg font-semibold hover:bg-white hover:text-blue-500 transition">
              Sign Up
            </button>
          }
          @if (isLoggedIn) {
            <div class="relative">
              <button
                (click)="toggleUserDropdown()"
                class="flex items-center gap-2 px-4 py-2 text-white bg-blue-700 bg-opacity-20 rounded-lg font-semibold hover:bg-opacity-30 transition border border-white border-opacity-30">
                <span class="w-8 h-8 flex items-center justify-center bg-white text-blue-500 rounded-full text-sm">
                  {{ username?.charAt(0)?.toUpperCase() }}
                </span>
                <span>{{ username }}</span>
                <svg class="w-4 h-4 transition-transform" [class.rotate-180]="showUserDropdown" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
              </button>

               @if (showUserDropdown) {
                 <div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl py-2 z-50 border border-gray-100">
                   <div class="px-4 py-2 border-b border-gray-100 mb-1">
                     <p class="text-xs text-gray-500">Signed in as</p>
                     <p class="text-sm font-bold text-gray-800 truncate">{{ username }}</p>
                   </div>
                   @if (isCustomer()) {
                     <a
                       routerLink="/orders"
                       (click)="showUserDropdown = false"
                       class="w-full text-left px-4 py-2 text-sm text-blue-600 hover:bg-blue-50 transition flex items-center gap-2">
                       <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                       </svg>
                       My Orders
                     </a>
                   }
                   <button
                     (click)="logout()"
                     class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition flex items-center gap-2">
                     <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                       <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                     </svg>
                     Logout
                   </button>
                 </div>
               }
            </div>
          }

        </div>
      </div>
    </div>
  </div>
</nav>
