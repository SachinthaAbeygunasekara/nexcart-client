<div class="min-h-screen bg-gradient-to-b from-green-50 to-white flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-lg shadow-lg p-8 text-center">
    <!-- Success Icon -->
    <div class="mb-6">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-green-100">
        <svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
      </div>
    </div>

    <!-- Success Message -->
    <h1 class="text-3xl font-bold text-gray-800 mb-2">Payment Successful!</h1>
    <p class="text-gray-600 mb-6">
      Thank you for your purchase. Your order has been confirmed and will be processed shortly.
    </p>

    <!-- Order Confirmation Details -->
    <div class="bg-gray-50 rounded-lg p-4 mb-6 text-left">
      <p class="text-sm text-gray-600">
        A confirmation email has been sent to your registered email address with order details and tracking information.
      </p>
    </div>

    <!-- Action Buttons -->
    <div class="flex flex-col gap-3">
      <button
        (click)="viewOrders()"
        class="w-full px-6 py-3 bg-gradient-to-r from-green-500 to-green-600 text-white font-semibold rounded-lg hover:from-green-600 hover:to-green-700 transition shadow-md">
        View My Orders
      </button>
      <button
        (click)="continueShopping()"
        class="w-full px-6 py-3 bg-blue-500 text-white font-semibold rounded-lg hover:bg-blue-600 transition shadow-md">
        Continue Shopping
      </button>
      <button
        (click)="goHome()"
        class="w-full px-6 py-3 bg-gray-200 text-gray-700 font-semibold rounded-lg hover:bg-gray-300 transition">
        Back to Home
      </button>
    </div>

    <!-- Additional Info -->
    <p class="text-xs text-gray-500 mt-6">
      Need help? <a href="mailto:support@nexcart.com" class="text-blue-500 hover:underline">Contact support</a>
    </p>
  </div>
</div>
