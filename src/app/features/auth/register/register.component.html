<div class="w-full relative">
  <!-- Card Container -->
  <div class="bg-white rounded-lg shadow-xl overflow-hidden">
    <!-- Close Button -->
    <button
      (click)="onClose()"
      class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 transition-colors z-10"
      aria-label="Close">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <!-- Form Container -->
    <div class="px-6 sm:px-8 py-8 sm:py-10">
      <h2 class="text-xl sm:text-2xl font-bold text-gray-900 mb-6 text-center">Create Account</h2>

      <!-- Alert Messages -->
      <div *ngIf="errorMessage" class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg">
        <p class="text-red-700 text-sm sm:text-base">{{ errorMessage }}</p>
      </div>

      <form (ngSubmit)="register()" class="space-y-4">
        <!-- Email Input -->
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
            Email Address
          </label>
          <input
            id="email"
            type="email"
            name="email"
            [(ngModel)]="email"
            placeholder="Enter your email"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200">
        </div>

        <!-- Username Input -->
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
            Username
          </label>
          <input
            id="username"
            type="text"
            name="username"
            [(ngModel)]="username"
            placeholder="Choose a username"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200">
        </div>

        <!-- Password Input -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
            Password
          </label>
          <input
            id="password"
            type="password"
            name="password"
            [(ngModel)]="password"
            placeholder="Create a strong password"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200">
          <p class="mt-1 text-xs text-gray-500">At least 8 characters recommended</p>
        </div>

        <!-- Confirm Password Input -->
        <div>
          <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-2">
            Confirm Password
          </label>
          <input
            id="confirmPassword"
            type="password"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            placeholder="Confirm your password"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200">
        </div>

        <!-- Terms & Conditions -->
        <div class="flex items-start">
          <input
            type="checkbox"
            id="terms"
            [(ngModel)]="agreeToTerms"
            name="agreeToTerms"
            class="w-4 h-4 text-blue-600 rounded cursor-pointer mt-1">
          <label for="terms" class="ml-2 text-sm text-gray-600">
            I agree to the
            <a href="#" class="text-blue-600 hover:text-blue-700">Terms of Service</a>
            and
            <a href="#" class="text-blue-600 hover:text-blue-700">Privacy Policy</a>
          </label>
        </div>

        <!-- Register Button -->
        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 ease-in-out transform hover:scale-105 disabled:hover:scale-100 mt-6">
          <span *ngIf="!isLoading">Create Account</span>
          <span *ngIf="isLoading" class="flex items-center justify-center">
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Creating account...
          </span>
        </button>
      </form>

      <!-- Sign In Link -->
      <div class="mt-6 text-center">
        <p class="text-gray-600 text-sm">Already have an account?
          <button (click)="onSwitchToLogin()" class="text-blue-600 hover:text-blue-700 font-semibold bg-none border-none cursor-pointer">Sign in</button>
        </p>
      </div>
    </div>
  </div>
</div>
