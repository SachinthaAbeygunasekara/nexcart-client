<div class="w-full relative">
  <!-- Card Container -->
  <div class="bg-white rounded-lg shadow-xl overflow-hidden">
    <!-- Close Button -->
    <button
      (click)="onClose()"
      class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 transition-colors z-10"
      aria-label="Close">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <!-- Form Container -->
    <div class="px-6 sm:px-8 py-8 sm:py-10">
      <h2 class="text-xl sm:text-2xl font-bold text-gray-900 mb-6 text-center">Sign In</h2>

      <!-- Alert Messages -->
      @if (errorMessage) {
        <div class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg">
          <p class="text-red-700 text-sm sm:text-base">{{ errorMessage }}</p>
        </div>
      }

      <form (ngSubmit)="login()" class="space-y-4">
        <!-- Username Input -->
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
            Username or Email
          </label>
          <input
            id="username"
            type="text"
            name="username"
            [(ngModel)]="username"
            placeholder="Enter your username"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200">
        </div>

        <!-- Password Input -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
            Password
          </label>
          <input
            id="password"
            type="password"
            name="password"
            [(ngModel)]="password"
            placeholder="Enter your password"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200">
        </div>

        <!-- Remember Me & Forgot Password -->
        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center cursor-pointer">
            <input type="checkbox" class="w-4 h-4 text-blue-600 rounded cursor-pointer">
            <span class="ml-2 text-gray-600">Remember me</span>
          </label>
          <a href="#" class="text-blue-600 hover:text-blue-700 font-medium">Forgot password?</a>
        </div>

        <!-- Login Button -->
        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 ease-in-out transform hover:scale-105 disabled:hover:scale-100">

          @if (!isLoading) {
            <span>Sign In</span>
          }

          @if(isLoading){
            <span class="flex items-center justify-center">
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                 viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Signing in...
          </span>
          }

        </button>
      </form>

      <!-- Sign Up Link -->
      <div class="mt-6 text-center">
        <p class="text-gray-600 text-sm">Don't have an account?
          <button (click)="onSwitchToRegister()"
                  class="text-blue-600 hover:text-blue-700 font-semibold bg-none border-none cursor-pointer">Sign up
          </button>
        </p>
      </div>
    </div>
  </div>
</div>
